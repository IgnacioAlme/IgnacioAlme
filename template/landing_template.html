<title>Ignacio Almenar | Portfolio Map</title>

<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            gtBlue: '#25aff4',
            gtDark: '#0a0c10',
            gtPanel: 'rgba(10, 12, 16, 0.85)',
            gtBorder: 'rgba(37, 175, 244, 0.4)',
          },
          fontFamily: {
            sans: ['Space Grotesk', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="custom-layout">
    body {
      background-color: #0a0c10;
      color: #ffffff;
      overflow: hidden; /* Fixed viewport like a game menu */
      height: 100vh;
      width: 100vw;
    }

    /* BEGIN: Map Background Effect */
    .map-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(37, 175, 244, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 175, 244, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -1;
    }

    .map-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #1a1f26 0%, #0a0c10 100%);
      z-index: -2;
    }

    .map-lines {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 100px,
        rgba(37, 175, 244, 0.02) 100px,
        rgba(37, 175, 244, 0.02) 101px
      );
      transform: rotate(-15deg);
      z-index: -1;
    }
    /* END: Map Background Effect */

    /* BEGIN: UI Polish */
    .gt-panel {
      border: 1px solid rgba(37, 175, 244, 0.3);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(37, 175, 244, 0.05);
      backdrop-filter: blur(8px);
    }

    .node-hover:hover .node-icon {
      transform: scale(1.1) translateY(-5px);
      filter: drop-shadow(0 0 15px #25aff4);
    }

    .node-icon {
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .scanline {
      width: 100%;
      height: 2px;
      background: rgba(37, 175, 244, 0.1);
      opacity: 0.1;
      position: absolute;
      bottom: 100%;
      animation: scanline 8s linear infinite;
    }

    @keyframes scanline {
      0% { bottom: 100%; }
      100% { bottom: 0%; }
    }
    /* END: UI Polish */
  </style>
</head>
<body class="font-sans antialiased">
<!-- Map Decorations -->
<div class="map-background"></div>

<header class="fixed top-0 left-0 w-full p-4 z-50 flex justify-between items-start pointer-events-none">

<div class="flex gap-4 pointer-events-auto">
<div class="gt-panel bg-gtPanel px-4 py-2 flex items-center gap-3">

</div>
<div class="gt-panel bg-gtPanel px-4 py-2 flex items-center gap-3">
<span class="text-[10px] font-bold text-gtBlue uppercase tracking-widest">Date</span>
<span class="text-xl font-bold tracking-tighter uppercase" id="current-date">-- APR</span>
</div>
</div>
<!-- Right: User Info Panel -->
<div class="gt-panel bg-gtPanel p-4 text-right pointer-events-auto">
<h1 class="text-xl font-bold tracking-tight uppercase">Ignacio Almenar</h1>
<p class="text-xs text-gtBlue font-medium tracking-widest uppercase">Técnico Universitario en Programación</p>
<div class="mt-2 flex justify-end gap-2">
<span class="text-[9px] border border-gtBlue/30 px-1 text-gtBlue/80">RESI: ARG</span>
<span class="text-[9px] border border-gtBlue/30 px-1 text-gtBlue/80">LVL: 24</span>
</div>
</div>
</header>
<!-- END: Top HUD -->

<script data-purpose="date-handler">
    function updateHUD() {
      const now = new Date();
      const day = now.getDate();
      const monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
      const month = monthNames[now.getMonth()];
      document.getElementById('current-date').textContent = `${day} ${month}`;
    }
    updateHUD();
    setInterval(updateHUD, 60000);
  </script>
